<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>box sizing-border box</title>
  <style>
    body {
      background: #222;
      padding: 20px;
    }
    .container {
      width: 300px;
      display: grid;
      gap: 20px;
    }
    .box-1 {
      width: 300px;
      padding: 20px;
      background: #f8f4ef;
    }
    .box-2 {
      width: 300px;
      padding: 20px;
      background: #f8f4ef;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box-1">CONTENT BOX</div>
    <div class="box-2">CONTENT BOX</div>
  </div>
</body>
</html>
